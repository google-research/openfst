# See https://github.com/actions/runner-images.

name: "Build and test on x64 Linux (Bazel)"

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{github.workflow}}-${{github.ref}}
  cancel-in-progress: true

env:
  cache-root: /tmp/bazel

jobs:
    build-and-test-x64-linux-bazel:
      name: Build and Test (x64 Linux, Bazel)
      runs-on: ubuntu-latest
      env:
        BAZEL: bazelisk-linux-amd64
        USE_BAZEL_VERSION: 9.0.0
        CC: gcc-14
        CXX: g++-14
        cache-name: ${{github.job}}
      steps:
        - uses: actions/checkout@v6
        - name: Setup Python
          uses: actions/setup-python@v6
        - name: Check Python
          run: python --version
        - name: Install Bazelisk
          run: |
            curl -LO "https://github.com/bazelbuild/bazelisk/releases/latest/download/$BAZEL"
            chmod +x $BAZEL
        - name: Check Bazelisk
          run: ./$BAZEL --version
        - name: Restore bazel cache
          uses: actions/cache/restore@v5
          id: bazel-cache-restore
          with:
            key: ${{env.cache-name}}
            path: ${{env.cache-root}}
        - name: Build
          run: |
            ./$BAZEL build -c opt //...
        - name: Test
          run: |
            ./$BAZEL test -c opt --test_size_filters=-enormous //...
