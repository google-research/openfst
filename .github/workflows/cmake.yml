# See https://github.com/actions/runner-images.

name: "CMake"

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{github.workflow }}-${{github.head_ref || github.ref}}
  cancel-in-progress: ${{github.ref != 'main'}}

# This gives read-only access to the token.
permissions: read-all

jobs:
    build-and-test:
      # Note that the status check UI will show something like
      # `CMake / CMake / x86-64 Linux`, but this name is the real name.
      name: CMake / ${{ matrix.name }}
      runs-on: ${{ matrix.os }}
      strategy:
        fail-fast: false
        matrix:
          os: [ubuntu-latest, macos-latest]
          include:
            - os: ubuntu-latest
              name: x86-64 Linux
            - os: macos-latest
              name: AArch64 macOS
      env:
        cache-name: ${{github.job}}-${{ matrix.os }}
      steps:
        - uses: actions/checkout@v6
        - name: Set Build Parallelism
          run: |
            echo "NPROC=$(getconf _NPROCESSORS_ONLN)" >> $GITHUB_ENV
        - name: Setup Python
          uses: actions/setup-python@v6
        - name: Check Python
          run: python --version
        - name: Install dependendcies
          run: |
            python3 -m pip install --break-system-packages absl-py cython
        - name: Setup ccache
          uses: hendrikmuhs/ccache-action@1bbbcda0748b3e340dee71a314fa68ffcbd6df79 # v1.2.21
          with:
            key: cmake-cache-${{env.cache-name}}
        - name: Configure
          run: >-
            cmake -S . -B build
            -DCMAKE_C_COMPILER_LAUNCHER=ccache
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
            -DOPENFST_ENABLE_BIN=ON -DOPENFST_BUILD_TESTS=ON -DBUILD_SHARED_LIBS=ON
            -DOPENFST_ENABLE_FSTS=ON -DOPENFST_ENABLE_GRM=ON -DOPENFST_ENABLE_PYTHON=ON
            -DOPENFST_ENABLE_CATEGORIAL=ON
        - name: Build
          run: |
            cmake --build build -j "$NPROC"
        - name: Test
          run: |
            ctest --test-dir build --output-on-failure -j "$NPROC"
