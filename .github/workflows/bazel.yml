# See https://github.com/actions/runner-images.

name: "Bazel"

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{github.workflow }}-${{github.head_ref || github.ref}}
  cancel-in-progress: ${{github.ref != 'main'}}

# This gives read-only access to the token.
permissions: read-all

jobs:
    build-and-test:
      # Note that the status check UI will show something like
      # `Bazel / Bazel / x86-64 Linux`, but this name is the real name.
      name: Bazel / ${{ matrix.name }}
      runs-on: ${{ matrix.os }}
      strategy:
        fail-fast: false
        matrix:
          os: [ubuntu-latest, macos-latest, windows-latest]
          include:
            - os: ubuntu-latest
              name: x86-64 Linux
              config: --config=dev
            - os: macos-latest
              name: AArch64 macOS
              config: --config=dev
              test_filters: --test_filter=-PywrapFstTest.testRandGen
            - os: windows-latest
              name: x64 Windows
              shell: pwsh
              test_filters: --test_tag_filters=-no_windows_msvc
      defaults:
        run:
          shell: ${{ matrix.shell || 'bash' }}
      env:
        USE_BAZEL_VERSION: 9.0.0
      steps:
        - uses: actions/checkout@v6
        - name: Setup Bazel
          uses: bazel-contrib/setup-bazel@c5acdfb288317d0b5c0bbd7a396a3dc868bb0f86 # 0.19.0
          with:
            # Avoid downloading Bazel every time.
            bazelisk-cache: true
            # Store build cache per workflow.
            disk-cache: ${{github.workflow}}
            # Share repository cache between workflows.
            repository-cache: true
        - name: Check Bazelisk
          run: bazelisk --version
        - name: Build
          run: |
            bazelisk build ${{ matrix.config }} -c fastbuild //...
        - name: Test
          shell: bash
          run: >-
            bazelisk test ${{ matrix.config }} -c fastbuild
            --test_size_filters=-enormous
            --test_output=errors
            ${{ matrix.test_filters }}
            //...
